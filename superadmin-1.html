<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin — Festival SaaS Console</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Malayalam:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0e1414;
    --panel:#141b1a;
    --panel-2:#1a2321;
    --line: #2a3532;
    --accent:#4fd1a5;      /* signal-green — "live event / published" feel */
    --accent-dim:#2f7a5e;
    --amber:#e0a940;       /* pending / warning */
    --text:#e9efec;
    --text-dim:#8ea69d;
    --danger:#e05f5f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--ink); color:var(--text);
    font-family:'IBM Plex Mono', monospace;
    min-height:100vh;
  }
  .malayalam{ font-family:'Noto Sans Malayalam','IBM Plex Mono',sans-serif; }
  h1,h2,h3,.disp{ font-family:'Space Grotesk', sans-serif; letter-spacing:-0.01em; }

  /* ---------- top bar ---------- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px; border-bottom:1px solid var(--line);
    background:var(--panel);
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:10px; height:10px; border-radius:2px; background:var(--accent);
    box-shadow:0 0 12px var(--accent);
  }
  .brand h1{ font-size:16px; margin:0; font-weight:600; }
  .brand small{ color:var(--text-dim); font-size:11px; display:block; margin-top:2px;}
  #authArea{ font-size:12px; color:var(--text-dim); }
  #authArea button{ margin-left:10px; }

  /* ---------- layout ---------- */
  main{ max-width:980px; margin:0 auto; padding:32px 20px 80px; }
  .grid{ display:grid; grid-template-columns:1fr; gap:20px; }
  @media(min-width:820px){ .grid{ grid-template-columns: 1fr 1.3fr; align-items:start; } }

  .card{
    background:var(--panel); border:1px solid var(--line);
    border-radius:10px; padding:22px;
  }
  .card h2{ font-size:14px; text-transform:uppercase; letter-spacing:.08em; color:var(--accent); margin:0 0 4px; }
  .card p.hint{ color:var(--text-dim); font-size:12px; margin:0 0 18px; }

  label{ display:block; font-size:11px; color:var(--text-dim); margin:14px 0 6px; text-transform:uppercase; letter-spacing:.05em;}
  input[type=text], input[type=email], input[type=password]{
    width:100%; padding:11px 12px; background:var(--ink); border:1px solid var(--line);
    color:var(--text); border-radius:6px; font-family:inherit; font-size:13px;
  }
  input:focus{ outline:none; border-color:var(--accent); }

  button{
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px;
    border:none; border-radius:6px; cursor:pointer; padding:11px 18px;
  }
  .btn-primary{ background:var(--accent); color:#08201a; width:100%; margin-top:20px; }
  .btn-primary:hover{ background:#68e0b8; }
  .btn-primary:disabled{ background:var(--accent-dim); cursor:not-allowed; }
  .btn-ghost{ background:transparent; border:1px solid var(--line); color:var(--text-dim); }
  .btn-ghost:hover{ border-color:var(--accent); color:var(--accent); }
  .btn-danger{ background:transparent; color:var(--danger); border:1px solid var(--danger); font-size:11px; padding:6px 10px;}

  #msg{ font-size:12px; margin-top:14px; padding:10px 12px; border-radius:6px; display:none; }
  #msg.ok{ display:block; background:rgba(79,209,165,.1); color:var(--accent); border:1px solid var(--accent-dim); }
  #msg.err{ display:block; background:rgba(224,95,95,.1); color:var(--danger); border:1px solid var(--danger); }

  /* ---------- tenant list ---------- */
  .tenant-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 0; border-bottom:1px solid var(--line);
  }
  .tenant-row:last-child{ border-bottom:none; }
  .tenant-name{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; }
  .tenant-meta{ color:var(--text-dim); font-size:11px; margin-top:3px; }
  .badge{ font-size:10px; padding:3px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.05em;}
  .badge.active{ background:rgba(79,209,165,.12); color:var(--accent); }
  .badge.inactive{ background:rgba(224,95,95,.12); color:var(--danger); }
  .tenant-actions{ display:flex; gap:8px; align-items:center; }
  .empty{ color:var(--text-dim); font-size:12px; text-align:center; padding:30px 0; }

  .credbox{
    margin-top:14px; padding:12px; background:var(--panel-2); border:1px dashed var(--accent-dim);
    border-radius:6px; font-size:12px; line-height:1.8;
  }
  .credbox b{ color:var(--accent); }

  #loginScreen{ max-width:360px; margin:80px auto; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark"></div>
    <div>
      <h1>Festival SaaS — Super Admin</h1>
      <small class="malayalam">എല്ലാ Madrasa tenants-ഉം ഇവിടെ നിന്ന് നിയന്ത്രിക്കാം</small>
    </div>
  </div>
  <div id="authArea"></div>
</header>

<main>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="card" style="display:none;">
    <h2>Super Admin Login</h2>
    <p class="hint malayalam">ഇത് താങ്കളുടെ മാത്രം ലോഗിൻ ആണ്</p>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="you@festivalsaas.com">
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="••••••••">
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div id="loginMsg" style="color:var(--danger); font-size:12px; margin-top:10px;"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">
    <div class="grid">

      <!-- CREATE TENANT -->
      <div class="card">
        <h2>+ New Madrasa</h2>
        <p class="hint malayalam">പുതിയൊരു Madrasa-യ്ക്ക് അവരുടെ സ്വന്തം dashboard-ഉം login-ഉം ഉണ്ടാക്കുക</p>

        <label class="malayalam">Madrasa പേര്</label>
        <input type="text" id="tName" placeholder="e.g. Darul Uloom Islamic Academy">

        <label>Tenant ID <span class="malayalam" style="text-transform:none;">(auto, unique — URL/DB-ൽ ഉപയോഗിക്കും)</span></label>
        <input type="text" id="tSlug" placeholder="auto-generated from name" oninput="this.dataset.manual=1">

        <label>Admin Email <span class="malayalam" style="text-transform:none;">(അവരുടെ ലോഗിൻ)</span></label>
        <input type="email" id="tEmail" placeholder="admin@thatmadrasa.com">

        <label>Admin Password</label>
        <input type="text" id="tPassword" placeholder="min 6 characters">

        <button class="btn-primary" id="createBtn" onclick="createTenant()">Create Madrasa Account</button>
        <div id="msg"></div>
      </div>

      <!-- TENANT LIST -->
      <div class="card">
        <h2>Registered Madrasas</h2>
        <p class="hint">ആകെ <span id="countBadge">0</span> tenants</p>
        <div id="tenantList"><div class="empty">Loading...</div></div>
      </div>

    </div>
  </div>

</main>

<!-- Firebase SDKs (v9 compat, matches single-file style) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* ============================================================
   1. FIREBASE CONFIG — ഇവിടെ താങ്കളുടെ project config ഒട്ടിക്കുക
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCrgKwFY55gROH2_FkZlEjyrZw3DmrC2us",
  authDomain: "meelad-9f4a0.firebaseapp.com",
  projectId: "meelad-9f4a0",
  storageBucket: "meelad-9f4a0.firebasestorage.app",
  messagingSenderId: "1067848252475",
  appId: "1:1067848252475:web:1953d18d55fbb967f5301e"
};

// Primary app — this is the Super Admin's own session
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ------------------------------------------------------------
   2. SECONDARY APP INSTANCE TRICK
   ------------------------------------------------------------
   Problem: Auth.createUserWithEmailAndPassword() automatically
   signs in AS that new user, kicking the Super Admin out.
   Fix: run tenant-admin creation on a second, isolated Firebase
   App instance ("secondary") that has its own Auth session.
   The Super Admin's session on the primary app is untouched.
   No Cloud Functions / Blaze plan required.
------------------------------------------------------------- */
let secondaryApp;
function getSecondaryAuth(){
  if (!secondaryApp) {
    secondaryApp = firebase.initializeApp(firebaseConfig, "Secondary");
  }
  return secondaryApp.auth();
}

/* ------------------------------------------------------------
   3. AUTH STATE
------------------------------------------------------------- */
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    show('loginScreen'); hide('dashboard');
    document.getElementById('authArea').innerHTML = '';
    return;
  }
  // Verify this uid is actually a super admin — role lives in Firestore
  // (userRoles/{uid}), not in an Auth custom claim, so this works on the
  // free Spark plan with no Cloud Functions.
  let roleDoc;
  try {
    roleDoc = await db.collection('userRoles').doc(user.uid).get();
  } catch (e) {
    roleDoc = null;
  }
  if (!roleDoc || !roleDoc.exists || roleDoc.data().role !== 'superadmin') {
    // NOTE: on first-ever run, no one has this role doc yet.
    // See the bootstrap instructions at the bottom of this file.
    document.getElementById('loginMsg').textContent =
      'ഈ account-ന് Super Admin access ഇല്ല. Bootstrap ചെയ്തോ എന്ന് നോക്കുക.';
    auth.signOut();
    return;
  }
  hide('loginScreen'); show('dashboard');
  document.getElementById('authArea').innerHTML =
    `${user.email} &nbsp; <button class="btn-ghost" onclick="auth.signOut()">Sign Out</button>`;
  loadTenants();
});

function show(id){ document.getElementById(id).style.display='block'; }
function hide(id){ document.getElementById(id).style.display='none'; }

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  try {
    await auth.signInWithEmailAndPassword(email, pw);
  } catch(e) {
    document.getElementById('loginMsg').textContent = e.message;
  }
}

// Show login screen by default until auth state resolves
show('loginScreen');

/* ------------------------------------------------------------
   4. SLUG AUTO-GENERATION
------------------------------------------------------------- */
document.getElementById('tName').addEventListener('input', (e) => {
  const slugField = document.getElementById('tSlug');
  if (slugField.dataset.manual) return; // user edited it manually, leave alone
  slugField.value = e.target.value
    .toLowerCase().trim()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/(^-|-$)/g, '');
});

/* ------------------------------------------------------------
   5. CREATE TENANT
------------------------------------------------------------- */
async function createTenant(){
  const name = document.getElementById('tName').value.trim();
  let slug = document.getElementById('tSlug').value.trim();
  const email = document.getElementById('tEmail').value.trim();
  const password = document.getElementById('tPassword').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('createBtn');

  msg.className = ''; msg.style.display = 'none';

  if (!name || !slug || !email || password.length < 6) {
    msg.className = 'err'; msg.textContent =
      'എല്ലാ fields-ഉം പൂരിപ്പിക്കുക. Password കുറഞ്ഞത് 6 characters വേണം.';
    return;
  }

  btn.disabled = true; btn.textContent = 'Creating...';

  try {
    // 5a. check tenantId isn't already taken
    const existing = await db.collection('tenants').doc(slug).get();
    if (existing.exists) throw new Error('ഈ Tenant ID നിലവിൽ ഉണ്ട്. വേറൊന്ന് ഉപയോഗിക്കുക.');

    // 5b. create the tenant admin's login on the SECONDARY app
    //     (does not disturb the super admin's own session)
    const secAuth = getSecondaryAuth();
    const cred = await secAuth.createUserWithEmailAndPassword(email, password);
    const newUid = cred.user.uid;
    await secAuth.signOut(); // clean up secondary session

    // 5c. write the tenant document (primary app / super admin session)
    await db.collection('tenants').doc(slug).set({
      name: name,
      adminEmail: email,
      adminUid: newUid,
      active: true,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // 5d. write the role doc — this is what firestore.rules checks to
    // grant this uid access to tenants/{slug}/**. Works on free Spark
    // plan; no Cloud Function needed. Only the Super Admin (per rules)
    // is allowed to write to userRoles, so this is safe to do client-side.
    await db.collection('userRoles').doc(newUid).set({
      role: 'tenantadmin',
      tenantId: slug
    });

    msg.className = 'ok';
    msg.innerHTML = `"${name}" create ചെയ്തു! <div class="credbox">
        <b>Tenant ID:</b> ${slug}<br>
        <b>Login Email:</b> ${email}<br>
        <b>Password:</b> ${password}<br>
        <span class="malayalam" style="color:var(--text-dim)">⚠️ ഈ password ഇനി കാണിക്കില്ല — ഇപ്പോൾ തന്നെ copy ചെയ്ത് Madrasa-യ്ക്ക് കൊടുക്കുക</span>
      </div>`;

    document.getElementById('tName').value = '';
    document.getElementById('tSlug').value = '';
    document.getElementById('tSlug').dataset.manual = '';
    document.getElementById('tEmail').value = '';
    document.getElementById('tPassword').value = '';
    loadTenants();

  } catch(e) {
    msg.className = 'err';
    msg.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Create Madrasa Account';
  }
}

/* ------------------------------------------------------------
   6. LIST TENANTS
------------------------------------------------------------- */
async function loadTenants(){
  const list = document.getElementById('tenantList');
  const snap = await db.collection('tenants').orderBy('createdAt', 'desc').get();

  document.getElementById('countBadge').textContent = snap.size;

  if (snap.empty) {
    list.innerHTML = '<div class="empty malayalam">ഇതുവരെ Madrasa-കൾ ഒന്നും ഇല്ല</div>';
    return;
  }

  list.innerHTML = '';
  snap.forEach(doc => {
    const t = doc.data();
    const row = document.createElement('div');
    row.className = 'tenant-row';
    row.innerHTML = `
      <div>
        <div class="tenant-name">${t.name}</div>
        <div class="tenant-meta">${doc.id} · ${t.adminEmail}</div>
      </div>
      <div class="tenant-actions">
        <span class="badge ${t.active ? 'active':'inactive'}">${t.active ? 'Active':'Suspended'}</span>
        <button class="btn-danger" onclick="toggleTenant('${doc.id}', ${t.active})">
          ${t.active ? 'Suspend' : 'Reactivate'}
        </button>
      </div>`;
    list.appendChild(row);
  });
}

async function toggleTenant(tenantId, currentlyActive){
  await db.collection('tenants').doc(tenantId).update({ active: !currentlyActive });
  loadTenants();
}
</script>

<!--
============================================================
BOOTSTRAP INSTRUCTIONS (ഒരു തവണ മാത്രം ചെയ്യേണ്ടത്, code വേണ്ട)
============================================================
ഈ file ആദ്യമായി run ചെയ്യുമ്പോൾ, ഒരു Super Admin account ഇല്ല.
ഇത് 100% Firebase Console-ൽ നിന്ന് തന്നെ ചെയ്യാം — free Spark
plan-ൽ, Node.js/Admin SDK ഒന്നും വേണ്ട:

1. Firebase Console > Authentication > Add User
   നിങ്ങളുടെ email + password കൊടുത്ത് ഒരു user create ചെയ്യുക.
   ആ user-ന്റെ UID copy ചെയ്യുക (Users list-ൽ കാണാം).

2. Firebase Console > Firestore Database > Start collection
   Collection ID: userRoles
   Document ID: (മുകളിൽ copy ചെയ്ത UID ഒട്ടിക്കുക — exact match വേണം)
   Field: role (string) = superadmin
   Save ചെയ്യുക.

3. superadmin.html-ൽ ആ email/password കൊണ്ട് login ചെയ്യുക — ready!

ഇനി എല്ലാ പുതിയ Madrasa tenant admin-ന്റെയും role automatic ആയി
ഈ dashboard തന്നെ create ചെയ്യും (step 5d, code-ൽ). ഈ manual
bootstrap വേണ്ടത് താങ്കളുടെ ഒരു Super Admin account-ന് മാത്രം.

Phase 2 (next): Tenant Admin login page + dashboard shell —
പറഞ്ഞാൽ തുടങ്ങാം.
============================================================
-->
</body>
</html>
